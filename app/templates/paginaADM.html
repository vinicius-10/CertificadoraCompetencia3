<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meninas Hub - Administração</title>
    <link rel="stylesheet" href="../static/css/admin.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/meninas_logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('main.home') }}">
            <img src="../static/img/meninas_logo.png" alt="Meninas Digitais brand logo displayed in the top navigation bar" class="nav-logo"/>
            <h1>Meninas Hub</h1>
        </a>
        <a href="{{ url_for('api.auth_api.logout') }}" class="btn-sair">Sair</a>
    </nav>

    <!-- MAIN -->
    <main>
        <!-- ── COLUNA LATERAL: PERFIL + RELATÓRIO ── -->
        <aside class="sidebar">
            <div class="profile-avatar">
                <img src="../static/img/meninas_digitais_perfil.png" alt="Foto do usuário"/>
            </div>

            <div class="field">
                <label class="field-label" for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ current_user.name }}" readonly/>
            </div>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}" readonly/>
            </div>

            <div class="profile-actions">
                <a href="{{ url_for('main.edit_adm') }}">
                    <button type="button" class="btn-editar-perfil">Editar</button>
                </a>

                <a href="{{ url_for('main.cadastro') }}">
                    <button type="button" class="btn-cadastrar-perfil">Cadastrar</button>
                </a>
            </div>

            <div class="report-panel">
                <span class="report-title">Gerar Relatório</span>
                <div class="report-buttons">
                    <button type="button" class="btn-report btn-report--pdf">PDF</button>
                    <button type="button" class="btn-report btn-report--csv">CSV</button>
                </div>
            </div>
        </aside>

        <!-- ── TABELA DE VOLUNTÁRIOS ── -->
        <section class="table-card">
            <div class="table-header">
                <span>Nome</span>
                <span>Setor</span>
                <span>Cargo</span>
                <span>Entrada</span>
                <span>Saída</span>
                <span>Tipo</span>
                <span></span>
            </div>

            <div class="table-body" id="table-body">
                {% for v in volunteers|default([]) %}
                <div class="table-row">
                    <span class="col-nome">{{ v.name }}</span>
                    <span>{{ v.sector }}</span>
                    <span>{{ v.role }}</span>
                    <span>{{ v.entry }}</span>
                    <span>{{ v.exit }}</span>
                    <span>{{ v.type }}</span>
                    <button type="button" class="btn-editar-linha">Editar</button>
                </div>
                {% else %}
                <!-- Linha de exemplo (placeholder enquanto o backend não envia os dados) -->
                <div class="table-row">
                    <span class="col-nome">Arthur Henrique Jardim da Cunha Pinto</span>
                    <span>Marketing</span>
                    <span>Assessor</span>
                    <span>2025.1</span>
                    <span>2026.2</span>
                    <span>Voluntário</span>
                    <button type="button" class="btn-editar-linha">Editar</button>
                </div>
                {% endfor %}
            </div>

            <!-- ── BARRA DE FILTROS ── -->
            <div class="table-filters">
                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search" placeholder="" aria-label="Buscar voluntário"/>
                </div>

                <label class="filter-check">
                    <input type="checkbox" id="filtro-todos"/>
                    Todos os voluntários
                </label>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-setor" aria-label="Filtrar por setor">
                        <option value="" selected disabled hidden>Setor</option>
                        <option value="marketing">Marketing</option>
                        <option value="tecnologia">Tecnologia</option>
                        <option value="rh">RH</option>
                    </select>
                </div>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-cargo" aria-label="Filtrar por cargo">
                        <option value="" selected disabled hidden>Cargo</option>
                        <option value="assessor">Assessor</option>
                        <option value="diretor">Diretor</option>
                        <option value="coordenador">Coordenador</option>
                    </select>
                </div>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-tipo" aria-label="Filtrar por tipo de usuário">
                        <option value="" selected disabled hidden>Tipo de usuário</option>
                        <option value="voluntario">Voluntário</option>
                        <option value="admin">Admin</option>
                        <option value="coordenador">Coordenador(a)</option>
                    </select>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
