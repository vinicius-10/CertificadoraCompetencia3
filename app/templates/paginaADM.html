<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meninas Hub - Administração</title>
    <link rel="stylesheet" href="../static/css/admin.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/meninas_logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>

    
    <nav>
        <a href="{{ url_for('main.home') }}">
            <img src="../static/img/meninas_logo.png" alt="Meninas Digitais brand logo displayed in the top navigation bar" class="nav-logo"/>
            <h1>Meninas Hub</h1>
        </a>
        <a href="{{ url_for('api.auth_api.logout') }}" class="btn-sair">Sair</a>
    </nav>

    <!-- MAIN -->
    <main>
        <!-- ── COLUNA LATERAL: PERFIL + RELATÓRIO ── -->
        <aside class="sidebar">
            <div class="profile-avatar">
                <img src="../static/img/meninas_digitais_perfil.png" alt="Foto do usuário"/>
            </div>

            <div class="field">
                <label class="field-label" for="nome">Nome</label>
                <input type="text" id="nome" name="nome" value="{{ current_user.name }}" readonly/>
            </div>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}" readonly/>
            </div>

            <div class="profile-actions">
                <a href="{{ url_for('main.edit_adm',user_id=user_id) }}">
                    <button type="button" class="btn-editar-perfil">Editar</button>
                </a>

                <a href="{{ url_for('main.cadastro') }}">
                    <button type="button" class="btn-cadastrar-perfil">Cadastrar</button>
                </a>
            </div>

            <div class="report-panel">
                <span class="report-title">Gerar Relatório</span>
                <div class="report-buttons">
                    <a href="#"
                        class="btn-report btn-report--pdf"
                        hx-get="{{ url_for('api.adm_api.report_pdf') }}"
                        hx-include="#filters-container [name]"
                        hx-target="this"
                        hx-swap="none">
                        PDF
                    </a>
                    <a href="#"
                        class="btn-report btn-report--csv"
                        hx-get="{{ url_for('api.adm_api.report_csv') }}"
                        hx-include="#filters-container [name]"
                        hx-target="this"
                        hx-swap="none">
                        CSV
                    </a>
                </div>
            </div>
        </aside>

        <!-- ── TABELA DE VOLUNTÁRIOS ── -->
        <section class="table-card">
            <div class="table-header">
                <button type="button" class="table-sort-button" data-sort-field="name">Nome</button>
                <button type="button" class="table-sort-button" data-sort-field="sector">Setor</button>
                <button type="button" class="table-sort-button" data-sort-field="position">Cargo</button>
                <button type="button" class="table-sort-button is-active" data-sort-field="entry_at" data-sort-dir="asc">Entrada</button>
                <button type="button" class="table-sort-button" data-sort-field="departure_at">Saída</button>
                <button type="button" class="table-sort-button" data-sort-field="profile">Tipo</button>
                <span></span>
            </div>

            <div class="table-body" id="table-body" hx-get="{{ url_for('api.adm_api.search_users') }}" hx-trigger="load">
            </div>

            <div
                id="table-sort-refresh"
                hx-get="{{ url_for('api.adm_api.search_users') }}"
                hx-trigger="refreshTable from:body"
                hx-target="#table-body"
                hx-include="#filters-container [name]"
                hx-swap="innerHTML">
            </div>

            <div class="table-filters" id="filters-container">
                <input type="hidden" id="sort-by" name="sort_by" value="entry_at">
                <input type="hidden" id="sort-dir" name="sort_dir" value="asc">

                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" 
                        id="search" 
                        name="q" 
                        placeholder="Nome ou RA" 
                        aria-label="Buscar voluntário"
                        hx-get="{{ url_for('api.adm_api.search_users') }}"
                        hx-trigger="keyup changed delay:300ms, search"
                        hx-target="#table-body"
                        hx-include="#filters-container [name]"/>
                </div>

                <label class="filter-check">
                    <input type="checkbox" 
                        id="filtro-todos" 
                        name="todos" 
                        value="true"
                        hx-get="{{ url_for('api.adm_api.search_users') }}"
                        hx-trigger="change"
                        hx-target="#table-body"
                        hx-include="#filters-container [name]"/>
                    Todos os voluntários
                </label>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-setor" 
                            name="setor" 
                            aria-label="Filtrar por setor"
                            hx-get="{{ url_for('api.adm_api.search_users') }}"
                            hx-trigger="change"
                            hx-target="#table-body"
                            hx-include="#filters-container [name]">
                        <option value="" selected>Setor (Todos)</option> <option value="{{UserSector.MARKETING.name}}">{{UserSector.MARKETING.value}}</option>
                        <option value="{{UserSector.RH.name}}">{{UserSector.RH.value}}</option>
                        <option value="{{UserSector.CONTENT.name}}">{{UserSector.CONTENT.value}}</option>
                        <option value="{{UserSector.INSTRUCTORS.name}}">{{UserSector.INSTRUCTORS.value}}</option>
                    </select>
                </div>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-cargo" 
                            name="cargo" 
                            aria-label="Filtrar por cargo"
                            hx-get="{{ url_for('api.adm_api.search_users') }}"
                            hx-trigger="change"
                            hx-target="#table-body"
                            hx-include="#filters-container [name]">
                        <option value="" selected>Cargo (Todos)</option>
                        <option value="{{UserPosition.STUDANT_COORDINATOR.name}}">{{UserPosition.STUDANT_COORDINATOR.value}}</option>
                        <option value="{{UserPosition.REPRESENTATIVE.name}}">{{UserPosition.REPRESENTATIVE.value}}</option>
                        <option value="{{UserPosition.VOLUNTEER.name}}">{{UserPosition.VOLUNTEER.value}}</option>
                    </select>
                </div>

                <div class="filter-select">
                    <svg class="filter-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
                    <select id="filtro-tipo" 
                            name="tipo" 
                            aria-label="Filtrar por tipo de usuário"
                            hx-get="{{ url_for('api.adm_api.search_users') }}"
                            hx-trigger="change"
                            hx-target="#table-body"
                            hx-include="#filters-container [name]">
                        <option value="" selected>Tipo (Todos)</option>
                        <option value="{{UserProfile.COORDINATOR.name}}">{{UserProfile.COORDINATOR.value}}</option>
                        <option value="{{UserProfile.SCHOLARSHIP.name}}">{{UserProfile.SCHOLARSHIP.value}}</option>
                        <option value="{{UserProfile.VOLUNTEER.name}}">{{UserProfile.VOLUNTEER.value}}</option>
                    </select>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
