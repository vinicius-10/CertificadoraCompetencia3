<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meninas Hub - Atualização de Informações Voluntárias</title>
    <link rel="stylesheet" href="../static/css/Atualizacao_info_Volun.css">
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='css/Atualizacao_info_Volun.css') }}">-->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/meninas_logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/update_volunter.js') }}"></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('main.home') }}">
            <img src="../static/img/meninas_logo.png" alt="Meninas Digitais brand logo displayed in the top navigation bar" class="nav-logo"/>
            <h1>Meninas Hub</h1>
        </a>
  </nav>
 
    <main>
        <div class="card">
            <p class="card-title">Atualização de Informações</p>
            <form id="cadastro-form">
                <div class="field">
                    <label class="field-label" for="Nome">Nome</label>
                    <input type="text" id="Nome" autocomplete="name" name="Nome" required value="{{ user.name }}"/>
                </div>
    
                <div class="field">
                    <label class="field-label" for="Email">Email</label>
                    <input type="email" id="Email" autocomplete="email" name="Email" required value="{{ user.email }}"/>

                </div>
    
                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="CPF">CPF</label>
                        <input type="text" id="CPF" autocomplete="cpf" name="CPF" required value="{{ user.cpf }}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="RG">RG</label>
                        <input type="text" id="RG" autocomplete="rg" name="RG" required value="{{ user.rg }}"/>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Profissao">Profissão</label>
                        <input type="text" id="Profissao" autocomplete="job-title" name="Profissao" required value="{{ user.profession }}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Estado Civil">Estado Civil</label>
                        <div class="field-input-wrapper custom-select">
                            <select id="Estado Civil" required name="Estado_Civil">
                                <option value="" hidden>Selecione...</option>
                                <option value="{{UserMarital.SINGLE.name}}" {{marital_options[UserMarital.SINGLE.name]}}>{{UserMarital.SINGLE.value}}</option>
                                <option value="{{UserMarital.MARRIED.name}}" {{marital_options[UserMarital.MARRIED.name]}}>{{UserMarital.MARRIED.value}}</option>
                                <option value="{{UserMarital.DIVORCED.name}}" {{marital_options[UserMarital.DIVORCED.name]}}>{{UserMarital.DIVORCED.value}}</option>
                                <option value="{{UserMarital.WIDOWED.name}}" {{marital_options[UserMarital.WIDOWED.name]}}>{{UserMarital.WIDOWED.value}}</option>
                                <option value="{{UserMarital.STABLE_UNION.name}}"{{marital_options[UserMarital.STABLE_UNION.name]}}>{{UserMarital.STABLE_UNION.value}}</option>
                            </select>
                        </div>
                        
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Nacionalidade">Nacionalidade</label>
                        <input type="text" id="Nacionalidade" autocomplete="country" name="Nacionalidade" required value="{{user.nationality}}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Registro Academico">Registro Acadêmico</label>
                        <input type="text" id="Registro Academico" autocomplete="student-id" name="Registro_Academico" required value="{{user.code_institutional}}"/>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="Logradouro">Logradouro</label>
                    <input type="text" id="Logradouro" autocomplete="street-address" name="Logradouro" required value="{{address.street}}"/>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Bairro">Bairro</label>
                        <input type="text" id="Bairro" autocomplete="neighborhood" name="Bairro" required value="{{address.neighborhood}}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="CEP">CEP</label>
                        <input type="text" id="CEP" autocomplete="postal-code" name="CEP" required value="{{address.postal_code}}"/>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Numero">Número</label>
                        <input type="text" id="Numero" autocomplete="address-line1" name="Numero" required value="{{address.number}}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Cidade">Cidade</label>
                        <input type="text" id="Cidade" autocomplete="address-level2" name="Cidade" required value="{{address.city}}"/>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Estado">Estado</label>
                        <input type="text" id="Estado" autocomplete="address-level1" name="Estado" required value="{{address.state}}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Pais">País</label>
                        <input type="text" id="Pais" autocomplete="country" name="Pais" required value="{{address.country}}"/>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="complemento">Complemento</label>
                    <input type="text" id="complemento" autocomplete="address-line2" name="complemento" value="{{ address.complement if address.complement else '' }}"/>
                </div>

                <h3 class="section-subtitle">Deseja alterar sua senha?</h3>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Nova senha">Nova senha</label>
                        <input type="password" id="Nova senha" autocomplete="new-password" name="Nova_senha"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Confirma Senha">Confirme a nova senha</label>
                        <input type="password" id="Confirma Senha" autocomplete="new-password" name="Confirma_Senha"/>
                    </div>
                </div>

                <button class="btn-atualizar" type="submit">Atualizar</button>
            </form>
        </div>
    </main>
</body>
</html>
