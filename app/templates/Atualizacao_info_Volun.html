<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meninas Hub - Atualização de Informações Voluntárias</title>
    <link rel="stylesheet" href="../static/css/Atualizacao_info_Volun.css">
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='css/Atualizacao_info_Volun.css') }}">-->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/meninas_logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="{{ url_for('main.home') }}">
            <img src="../static/img/meninas_logo.png" alt="Meninas Digitais brand logo displayed in the top navigation bar" class="nav-logo"/>
            <h1>Meninas Hub</h1>
        </a>
  </nav>
 
    <main>
        <div class="card">
            <p class="card-title">Atualização de Informações</p>
            <form id="cadastro-form">
                <div class="field">
                    <label class="field-label" for="Nome">Nome</label>
                    <input type="text" id="Nome" autocomplete="name" value="{{ user.name }}"/>
                </div>
    
                <div class="field">
                    <label class="field-label" for="Email">Email</label>
                    <input type="email" id="Email" autocomplete="email" value="{{ user.email }}"/>
                </div>
    
                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="CPF">CPF</label>
                        <input type="text" id="CPF" autocomplete="cpf" required value="{{ user.cpf }}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="RG">RG</label>
                        <input type="text" id="RG" autocomplete="rg" required value="{{ user.rg }}"/>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Profissao">Profissão</label>
                        <input type="text" id="Profissao" required  autocomplete="job-title" value="{{ user.profession }}"/>
                    </div>

                    <div class="field">
                        <label class="field-label" for="Estado Civil">Estado Civil</label>
                        <div class="field-input-wrapper custom-select">
                            <select id="Estado Civil" required>
                                <option value="" hidden>Selecione...</option>
                                <option value="{{UserMarital.SINGLE}}" {{marital_options[UserMarital.SINGLE.name]}}>{{UserMarital.SINGLE.value}}</option>
                                <option value="{{UserMarital.MARRIED}}" {{marital_options[UserMarital.MARRIED.name]}}>{{UserMarital.MARRIED.value}}</option>
                                <option value="{{UserMarital.DIVORCED}}" {{marital_options[UserMarital.DIVORCED.name]}}>{{UserMarital.DIVORCED.value}}</option>
                                <option value="{{UserMarital.WIDOWED}}" {{marital_options[UserMarital.WIDOWED.name]}}>{{UserMarital.WIDOWED.value}}</option>
                                <option value="{{UserMarital.STABLE_UNION}}"{{marital_options[UserMarital.STABLE_UNION.name]}}>{{UserMarital.STABLE_UNION.value}}</option>
                            </select>
                        </div>
                        
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="Nacionalidade">Nacionalidade</label>
                    <input type="text" id="Nacionalidade" autocomplete="country" required value="{{user.nationality}}" />
                </div>

                <div class="field">
                    <label class="field-label" for="Logradouro">Logradouro</label>
                    <input type="text" id="Logradouro" autocomplete="street-address" required value="{{address.street}}" />
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Bairro">Bairro</label>
                        <input type="text" id="Bairro" autocomplete="neighborhood" required value="{{address.neighborhood}}" />
                    </div>

                    <div class="field">
                        <label class="field-label" for="CEP">CEP</label>
                        <input type="text" id="CEP" autocomplete="postal-code" required value="{{address.zip_code}}" />
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Numero">Número</label>
                        <input type="text" id="Numero" autocomplete="address-line1" required value="{{address.number}}" />
                    </div>

                    <div class="field">
                        <label class="field-label" for="Cidade">Cidade</label>
                        <input type="text" id="Cidade" autocomplete="address-level2" required value="{{address.city}}" />
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="Estado">Estado</label>
                        <input type="text" id="Estado" autocomplete="address-level1" required value="{{address.state}}" />
                    </div>

                    <div class="field">
                        <label class="field-label" for="Pais">País</label>
                        <input type="text" id="Pais" autocomplete="country" required value="{{user.country}}" />
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="complemento">Complemento</label>
                    <input type="text" id="complemento" autocomplete="address-line2" required value="{{address.complement}}" />
                </div>

                <button class="btn-atualizar" type="button">Atualizar</button>
            </form>
        </div>
    </main>
</body>
</html>
