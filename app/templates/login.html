<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meninas Hub - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <!--<link rel="stylesheet" href="../static/css/login.css">-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <img src="../static/img/meninas_logo.png" alt="Meninas Digitais Logo" class="nav-logo"/>
    <h1>Meninas Hub</h1>
  </nav>
 
  <!-- MAIN -->
  <main>
    <div class="card">
      <p class="card-title">Login</p>
 
      <div class="field">
        <label class="field-label" for="usuario">
          <svg width="40px" height="40px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Usuário
        </label>
        <input type="text" id="usuario" autocomplete="username" />
      </div>
 
      <div class="field">
        <label class="field-label" for="senha">
          <svg width="40px" height="40px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Senha
        </label>
        <input type="password" id="senha" autocomplete="current-password" />
        <button class="forgot" type="button">Esqueci a senha</button>
      </div>
 
      <button class="btn-login" type="button">Entrar</button>
    </div>
  </main>
</body>
</html>
